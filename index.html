<!doctype html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Home Page</title>
        <link rel="stylesheet" href="css/style.css">

        <!-- Font Style 1 -->
        <script>
            (function(d) {
              var config = {
                kitId: 'zqe4kkq',
                scriptTimeout: 3000,
                async: true
              },
              h=d.documentElement,t=setTimeout(function(){h.className=h.className.replace(/\bwf-loading\b/g,"")+" wf-inactive";},config.scriptTimeout),tk=d.createElement("script"),f=false,s=d.getElementsByTagName("script")[0],a;h.className+=" wf-loading";tk.src='https://use.typekit.net/'+config.kitId+'.js';tk.async=true;tk.onload=tk.onreadystatechange=function(){a=this.readyState;if(f||a&&a!="complete"&&a!="loaded")return;f=true;clearTimeout(t);try{Typekit.load(config)}catch(e){}};s.parentNode.insertBefore(tk,s)
            })(document);
          </script>
    </head>
    <body>
        <!-- Background soundtrack for the landing page -->
        <audio id="bgMusic" autoplay loop>
            <source src="img/pokemon.mp3" type="audio/mp3" alt="a nostalgic theme song of the Pokemon franchise">
            Your browser does not support the audio element.
        </audio>

        <!-- Pikachu click sound effect used during page transition -->
        <audio id="pikachuSfx" preload="auto">
            <source src="img/pikapika.mp3" type="audio/mp3" alt="pikachu sound">
        </audio>

        <!-- User control to toggle background music on/off -->
        <button id="musicCueBtn" class="music-cue-btn" type="button">Start Music</button>

        <!-- Hero title text -->
        <h2 class="hero-title">
            <span class="title-part part-left">Let's help Pikachu</span>
            <span class="title-part part-up">find out what's going down</span>
            <span class="title-part part-right">at the feed!</span>
        </h2>
        <!-- Decorative side characters -->
        <img src="img/pikachus.png" class="left-pikachus" alt="subtle drawings of pikachu part 1">
        <img src="img/pikachus2.png" class="right-pikachus" alt="subtle drawings of pikachu part 2">
        <!-- Main call-to-action area -->
        <nav>
            <div class="pikachu-wrap">
                <!-- Animated "tap me" indicator above the CTA -->
                <div class="arrow"> 
                    <img src="img/tapme.gif" alt="a gif bouncing up and down with an arrow pointing down to the running pikachu">
                </div>
                <!-- Clickable Pikachu that transitions to the feed page -->
                <a href="thefeed/thefeed.html" class="pikachu-container">
                    <img src="img/pikachurun.gif" id="pikachuindex" class="logo" width="400" alt="a fixed pikachu that is running to the right"/>
                </a>
            </div>
        </nav>
        <!-- Landing page behavior script -->
        <script src="js/script.js" defer></script>
    </body>
</html>
